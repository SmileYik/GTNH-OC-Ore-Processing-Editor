<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GTNH OC 矿处配置编辑器</title>
    <meta
      name="description"
      content="离线浏览、编辑和导出 OC 矿处配置文件的 Vite + React + TypeScript 工具。"
    />
    <style>
      :root {
        color-scheme: light;
        --preloader-bg-0: #fcfbfd;
        --preloader-bg-1: #f6f3f9;
        --preloader-surface: rgba(255, 255, 255, 0.88);
        --preloader-surface-strong: rgba(255, 255, 255, 0.96);
        --preloader-surface-soft: #f6f2f9;
        --preloader-border: #e4deea;
        --preloader-text-0: #241d2e;
        --preloader-text-1: #5b5367;
        --preloader-text-2: #82788f;
        --preloader-primary: #78649c;
        --preloader-primary-soft: #f1edf7;
        --preloader-shadow: 0 24px 60px rgba(70, 48, 104, 0.12);
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(120, 100, 156, 0.12), transparent 34%),
          radial-gradient(circle at 84% 8%, rgba(120, 100, 156, 0.08), transparent 28%),
          linear-gradient(180deg, var(--preloader-bg-0), var(--preloader-bg-1));
      }

      body {
        font-family:
          Inter, 'Aptos', 'Segoe UI', 'Hiragino Sans GB', 'Microsoft YaHei', 'PingFang SC', system-ui, sans-serif;
        color: var(--preloader-text-0);
      }

      #root {
        min-height: 100vh;
      }

      .app-preloader {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(120, 100, 156, 0.1), transparent 32%),
          radial-gradient(circle at 80% 12%, rgba(120, 100, 156, 0.06), transparent 26%),
          linear-gradient(180deg, rgba(252, 251, 253, 0.98), rgba(246, 243, 249, 0.98));
      }

      .app-preloader__card {
        width: min(560px, calc(100vw - 32px));
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 24px;
        border-radius: 28px;
        border: 1px solid var(--preloader-border);
        background: var(--preloader-surface);
        box-shadow: var(--preloader-shadow);
        backdrop-filter: blur(18px);
      }

      .app-preloader__header {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .app-preloader__indicator {
        position: relative;
        width: 52px;
        height: 52px;
        flex: 0 0 auto;
      }

      .app-preloader__indicator::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          conic-gradient(
            from 180deg,
            transparent 0deg 118deg,
            var(--preloader-primary) 118deg 282deg,
            transparent 282deg 360deg
          );
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 0);
        mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 0);
        animation: app-preloader-rotate 1.15s linear infinite;
      }

      .app-preloader__indicator::after {
        content: '';
        position: absolute;
        inset: 9px;
        border-radius: 50%;
        background: var(--preloader-surface-strong);
        box-shadow: inset 0 0 0 1px rgba(120, 100, 156, 0.08);
      }

      .app-preloader__copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .app-preloader__eyebrow {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--preloader-text-2);
      }

      .app-preloader__title {
        font-size: 1.16rem;
        font-weight: 600;
        line-height: 1.2;
      }

      .app-preloader__text {
        font-size: 0.92rem;
        color: var(--preloader-text-1);
      }

      .app-preloader__progress {
        position: relative;
        overflow: hidden;
        height: 4px;
        border-radius: 999px;
        background: var(--preloader-primary-soft);
      }

      .app-preloader__progress::before {
        content: '';
        position: absolute;
        inset: 0 auto 0 -36%;
        width: 36%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(120, 100, 156, 0), var(--preloader-primary), rgba(120, 100, 156, 0.24));
        animation: app-preloader-slide 1.4s ease-in-out infinite;
      }

      .app-preloader__skeleton {
        display: grid;
        gap: 10px;
      }

      .app-preloader__line {
        position: relative;
        overflow: hidden;
        height: 12px;
        border-radius: 999px;
        background: var(--preloader-surface-soft);
      }

      .app-preloader__line::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.7) 48%,
          transparent 100%
        );
        transform: translateX(-100%);
        animation: app-preloader-sheen 1.8s ease-in-out infinite;
      }

      .app-preloader__line--primary {
        width: min(72%, 320px);
      }

      .app-preloader__line--secondary {
        width: min(92%, 420px);
      }

      .app-preloader__line--tertiary {
        width: min(56%, 260px);
      }

      @keyframes app-preloader-rotate {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes app-preloader-slide {
        0% {
          transform: translateX(0);
        }

        100% {
          transform: translateX(380%);
        }
      }

      @keyframes app-preloader-sheen {
        0% {
          transform: translateX(-100%);
        }

        100% {
          transform: translateX(180%);
        }
      }

      @media (max-width: 640px) {
        .app-preloader {
          padding: 16px;
        }

        .app-preloader__card {
          width: min(100vw - 16px, 560px);
          padding: 18px;
          border-radius: 24px;
        }

        .app-preloader__header {
          align-items: flex-start;
        }

        .app-preloader__indicator {
          width: 44px;
          height: 44px;
        }

        .app-preloader__title {
          font-size: 1.04rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-preloader" class="app-preloader" role="status" aria-live="polite" aria-label="页面加载中">
      <div class="app-preloader__card">
        <div class="app-preloader__header">
          <div class="app-preloader__indicator" aria-hidden="true"></div>
          <div class="app-preloader__copy">
            <div class="app-preloader__eyebrow">GTNH OC 矿处配置编辑器</div>
            <div class="app-preloader__title">正在加载编辑器</div>
            <div class="app-preloader__text">正在准备离线配置和资源数据库，请稍候。</div>
          </div>
        </div>
        <div class="app-preloader__progress" aria-hidden="true"></div>
        <div class="app-preloader__skeleton" aria-hidden="true">
          <div class="app-preloader__line app-preloader__line--primary"></div>
          <div class="app-preloader__line app-preloader__line--secondary"></div>
          <div class="app-preloader__line app-preloader__line--tertiary"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
